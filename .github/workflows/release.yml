name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match package version ${VERSION}" >&2
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build plugin bundle
        run: npm run build:plugin

      - name: Verify pack contents
        run: |
          PACK_JSON="$(npm pack --json --pack-destination /tmp)"
          TARBALL="$(node -e "const data = JSON.parse(process.argv[1]); console.log('/tmp/' + data[0].filename)" "$PACK_JSON")"
          tar -tf "$TARBALL" | grep -F "package/dist/plugin.js"

      - name: Publish to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          npm view "@openduo/channel-wechat@${VERSION}" version >/dev/null 2>&1 && \
            echo "SKIP: @openduo/channel-wechat@${VERSION} already published" || \
            npm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
